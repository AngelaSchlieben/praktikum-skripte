name: lint

on: [push]


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: ruff
        uses: astral-sh/ruff-action@v4.0.0

  pyright:
    runs-on: ubuntu-latest
    steps:
      - name: pyright
        uses: jakebailey/pyright-action@v3
        with:
          version: 1.1.311 # Optional (change me!)
