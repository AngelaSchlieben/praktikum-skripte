name: lint

on: [push]

jobs:

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: ruff
        uses: astral-sh/ruff-action@v4.0.0

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: pyright
        uses: jakebailey/pyright-action@v3
        with:
          version: 1.1.311
